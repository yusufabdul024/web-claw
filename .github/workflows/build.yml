# Typecheck + lint + build + bundle-budget gate.
# Assumes the project under the repo root uses pnpm; swap to npm/yarn/bun
# by editing the install + script step accordingly.
name: Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: false

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Build
        run: pnpm build

      - name: Bundle budget check
        run: |
          python web-claw/scripts/check-bundle.py --dir .

      - name: Upload build output (optional)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            dist/
            build/
          if-no-files-found: ignore
